<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>barber.pe — Software de reservas para barberías y salones | Perú</title>
    <meta name="description" content="Software de reservas y agenda para barberías y salones en Perú. Tus clientes reservan y confirman 24/7. Tu barbería, llena, sin mover un dedo. En soles, sin comisiones." />
    <link rel="canonical" href="https://barber.pe/" />
    <meta property="og:site_name" content="barber.pe" />
    <meta property="og:title" content="barber.pe — Llena tu silla, no tu cuaderno" />
    <meta property="og:description" content="Tu propio sitio de reservas con tu marca. Clientes que agendan y confirman solos, agenda por barbero, caja y reportes. En soles, sin comisiones." />

    <meta property="og:image" content="https://barber.pe/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Datos estructurados (SEO): plataforma + organización + sitio -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://barber.pe/#org",
          "name": "barber.pe",
          "url": "https://barber.pe/",
          "logo": "https://barber.pe/barber-logo.png"
        },
        {
          "@type": "WebSite",
          "@id": "https://barber.pe/#web",
          "url": "https://barber.pe/",
          "name": "barber.pe",
          "inLanguage": "es-PE",
          "publisher": { "@id": "https://barber.pe/#org" }
        },
        {
          "@type": "SoftwareApplication",
          "name": "barber.pe",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://barber.pe/",
          "description": "Software de reservas y agenda para barberías y salones en Perú. Tus clientes reservan y confirman 24/7. En soles, sin comisiones.",
          "offers": { "@type": "Offer", "priceCurrency": "PEN" },
          "areaServed": { "@type": "Country", "name": "Perú" },
          "publisher": { "@id": "https://barber.pe/#org" }
        }
      ]
    }
    </script>

    <!-- Fuentes de la landing: Bricolage Grotesque (display) + Plus Jakarta Sans (texto) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,400..600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b1220;font-family:'Plus Jakarta Sans',system-ui,sans-serif;">
        <div style="width:42px;height:42px;border:3px solid rgba(255,255,255,0.15);border-top-color:#2092B4;border-radius:50%;animation:appspin .8s linear infinite;"></div>
        <p style="margin-top:16px;color:#9aa6b2;font-size:14px;letter-spacing:.3px;">Cargando Barber.PE…</p>

    </div>
    <style>@keyframes appspin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
